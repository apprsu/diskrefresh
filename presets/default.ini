; diskrefresh colour preset — default (Victoria-like)
;
; Maps block access latency -> colour. Edit freely, or copy this file to make
; your own preset; any *.ini in this folder shows up in the "Preset" selector.
;
; Available colour names:
;   grey  green  light_green  dark_green  yellow  orange  red  dark_red
;   magenta  purple  blue  cyan  white
;
; How matching works: a block's measured latency is compared against the
; bucket bounds from fastest to slowest. The first bound it is <= to wins.
; Anything slower than the last bound falls into the "timeout" bucket.

[meta]
name = Default
unit = ms

[buckets]
; upper_bound_ms = colour
100  = green
200  = light_green
500  = yellow
1000 = orange
5000 = red

; everything slower than the last bound (here >5000 ms):
timeout = magenta

; how to paint a block that returned an I/O error (EIO / bad sector).
; format: "<fg> on <bg>"  (or just "<fg>", bg defaults to dark_red)
error = white on dark_red
