; diskrefresh colour preset — strict
;
; Tighter thresholds: good for auditing an old or suspect drive where you want
; even mildly slow sectors to stand out. A healthy modern drive should be
; almost entirely green under these rules.

[meta]
name = Strict
unit = ms

[buckets]
20   = green
50   = light_green
150  = yellow
400  = orange
1500 = red

timeout = magenta
error = white on dark_red
